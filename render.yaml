services:
  - type: web
    name: mchanga-afya-backend
    env: node
    rootDir: backend
    buildCommand: "npm install"
    startCommand: "npm start"
    plan: free
    region: frankfurt
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: mchanga-afya-db
          property: connectionString
      - key: NODE_ENV
        value: production
    autoDeploy: true
    healthCheckPath: "/"

  - type: pserv
    name: mchanga-afya-db
    databaseName: agri_intelligence
    databaseUser: postgres
    databasePassword: ${POSTGRES_PASSWORD}
    plan: free
    region: frankfurt
